<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Registration</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='employee_registration.css') }}">
</head>
<body>
  <div class="container">
    <h2>Employee Registration</h2>
    <p style="text-align: center;">Register to access employee portal features</p>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('employee_signup') }}">
      <div class="section-title">Basic Information</div>
      <label for="full-name">Full Name</label>
      <input type="text" id="full-name" name="first_name" placeholder="Enter your first name">
      <input type="text" id="last-name" name="last_name" placeholder="Enter your last name">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email address">

      <label for="phone">Phone Number</label>
      <input type="text" id="phone" name="phone" placeholder="Enter your phone number">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" maxlength="10" placeholder="Create password (max 10 characters)">
      <small id="password-strength-text"></small>

      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm your password">

      <div class="section-title">Company Information</div>
      <label for="company-name">Company Name</label>
      <input type="text" id="company-name" name="company_name" placeholder="Enter your company name">

      <label for="company-website">Company Website</label>
      <input type="text" id="company-website" name="company_website" placeholder="Enter company website URL">

      <label for="designation">Employee ID/Designation</label>
      <input type="text" id="designation" name="designation" placeholder="Enter your employee ID or designation">

      <label for="department">Department</label>
      <select id="department" name="department">
        <option value="" disabled selected>Select your department</option>
        <option value="HR">HR</option>
        <option value="IT">IT</option>
        <option value="Sales">Sales</option>
        <option value="Marketing">Marketing</option>
        <option value="Finance">Finance</option>
        <option value="Other">Other</option>
      </select>

      <div class="section-title">Verification</div>
      <label for="verification-doc">Upload Company ID/Verification Document</label>
      <input type="file" id="verification-doc" name="verification_doc">
      <small>Upload a scanned copy of your company ID or verification document</small>

      <div class="terms">
        <input type="checkbox" id="agree" name="terms">
        <label for="agree">I agree to the <a href="#">Terms & Conditions</a></label>
      </div>

      <button class="btn">Register</button>
    </form>
  </div>

  <script src="{{ url_for('static', filename='employee_registration.js') }}"></script>
  <script>
    const passwordInput = document.getElementById('password');
    const strengthText = document.getElementById('password-strength-text');

    passwordInput.addEventListener('input', () => {
      const password = passwordInput.value;
      const hasUpper = /[A-Z]/.test(password);
      const hasLower = /[a-z]/.test(password);
      const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

      let strength = 0;
      if (hasUpper) strength++;
      if (hasLower) strength++;
      if (hasSpecial) strength++;

      if (password.length === 0) {
        passwordInput.style.backgroundColor = 'white';
        strengthText.textContent = '';
      } else if (strength === 1 || password.length < 6) {
        passwordInput.style.backgroundColor = '#ffcccc';
        strengthText.textContent = 'Weak password';
        strengthText.style.color = '#cc0000';
      } else if (strength === 2) {
        passwordInput.style.backgroundColor = '#fff4cc';
        strengthText.textContent = 'Moderate password';
        strengthText.style.color = '#ff9900';
      } else if (strength === 3 && password.length >= 6) {
        passwordInput.style.backgroundColor = '#d4fcd4';
        strengthText.textContent = 'Strong password';
        strengthText.style.color = '#33cc33';
      }
    });
  </script>
</body>
</html>
